# Default trial parameters for a benchmark run. The model provider is read from the
# dashboard-configured ProviderConfig (DB), not here, and is snapshotted per run.
trials: 1                 # independent runs per entry point (the agent is stochastic)
agent: investigation
run_concurrency: 2        # live benchmark sessions to run at once
metrics: all               # or a subset, e.g. [phase_recall, verdict_correctness]
poll_timeout_secs: 3600    # per-run wait before treating a trial as timed out

caps:
  max_steps: 200
  max_tool_calls: 400

# Token pricing (USD per 1M tokens) — used only to turn the measured per-run token
# counts in each trial's meta.json into an estimated cost in the run summary.
pricing:
  input_per_mtok: 0.75
  output_per_mtok: 4.50
