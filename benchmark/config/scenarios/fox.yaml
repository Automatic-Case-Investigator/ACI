# Fox scenario — AIT-LDSv2 victim host `wazuh-client`.
# Ground truth is the canonical AIT label file (benchmark/fixtures/labels.csv,
# rows where scenario == fox); phase windows below are copied from it verbatim.
#
# Three distinct hosts share the agent.name "wazuh-client" but differ by agent.id:
#   27 (10.35.35.206) — the web -> credential-access -> privesc chain (the main chain)
#   1  (10.35.33.111) — service_stop, a day earlier
#   18 (172.17.131.81) — dnsteal, a day earlier
# No confirmed network link between 27 and 1/18 was found; treat 1/18 as a
# scope-boundary test, not an assumed continuation of the 27 chain.
name: fox
dataset: ait-ldsv2

host_map:
  "27": {ip: 10.35.35.206, role: "web/credential-access/privesc chain (main)"}
  "1":  {ip: 10.35.33.111, role: "service_stop (separate host, prior day)"}
  "18": {ip: 172.17.131.81, role: "dnsteal (separate host, prior day)"}

# What the SIEM would REALISTICALLY hand the agent vs. what we inject to probe a
# specific reasoning direction. `recon` is anchored to the imported alert descriptor
# instead of a transient TheHive case id, so benchmark runs remain valid after case
# teardown/re-import cycles.
entry_points:
  - id: recon
    kind: organic
    anchor_timestamp: 2022-01-18T12:19:10Z
    anchor_rule_id: "31151"
    anchor_agent_id: "27"
    reasoning_direction: forward       # start at recon noise, chain forward to impact
  - id: privilege_escalation
    kind: synthetic                    # rule 5501 (level 3) never promotes on its own
    anchor_event_id: "1700000000.110417"
    reasoning_direction: backward      # confirmed privesc -> attribute the entry vector

expected_verdict:
  verdict: tp
  severity: critical
  scope: ["wazuh-client"]              # the agent.id=27 host; a correct scope excludes 1/18 unless linked

# Ordered attack phases. The authoritative matcher is:
#   1) a discrete printed timestamp inside the labels.csv window, plus
#   2) a content signature that identifies the phase.
#
# The scorer deliberately avoids matching Wazuh/OpenSearch `_id` values or any other
# setup-specific identifiers. `marker_rules` below remain documentation of the real
# detecting rule family for the phase; the `content_signature` is what phase_recall
# actually looks for on the timestamped report line. Signature keywords are
# conjunctive: every listed term must be present in the same surfaced line or raw event.
# Phases with `scorable: false` have no distinguishing event in the dump and are
# excluded from the recall denominator.
phases:
  - name: service_stop
    start: 2022-01-17T09:04:46Z
    end:   2022-01-17T09:04:48Z
    agent_id: "1"
    marker_rules: ["80700"]
    marker_event_ids: []
    content_signature:
      all: ["type=service_stop", "unit=consequuntur"]

  # UNSCORABLE: only 3 benign dnsmasq query lines fall in this hour (youtu.be x2,
  # mail.price.fox.org); no long/encoded subdomains indicative of tunneling exist anywhere
  # in the dump, so there is no distinguishing event to retrieve.
  - name: dnsteal
    start: 2022-01-17T09:04:48Z
    end:   2022-01-17T10:00:00Z
    agent_id: "18"
    scorable: false
    marker_rules: []
    marker_event_ids: []

  # The four AIT recon sub-phases have DISTINCT detection signatures (per the AIT ground
  # truth), so they are scored separately and matched on their real rules — id→timestamp
  # resolution attributes a cited event to the exact sub-window it falls in.
  # network_scans is UNSCORABLE: a raw SYN/ping sweep leaves no payload for Wazuh's decoders,
  # so there is no distinguishing event to retrieve — window is background noise only.
  - name: network_scans
    start: 2022-01-18T11:59:00Z
    end:   2022-01-18T12:17:00Z
    agent_id: "27"
    scorable: false          # no distinguishing event exists in the dump
    marker_rules: []
    marker_event_ids: []

  - name: service_scans
    start: 2022-01-18T12:17:00Z
    end:   2022-01-18T12:17:47Z
    agent_id: "27"
    marker_rules: ["86601", "5706"]   # ET SCAN Nmap User-Agent + sshd insecure connection (scan)
    marker_event_ids: []
    content_signature:
      all:
        - "et scan possible nmap user-agent observed"
        - "172.17.130.196"

  - name: wpscan
    start: 2022-01-18T12:17:47Z
    end:   2022-01-18T12:18:30Z
    agent_id: "27"
    marker_rules: ["31101"]           # Web server 400 error, "WPScan v3.8.20" User-Agent
    marker_event_ids: []
    content_signature:
      all:
        - "wpscan v3.8.20"
        - "172.17.130.196"

  - name: dirb
    start: 2022-01-18T12:18:30Z
    end:   2022-01-18T12:38:00Z
    agent_id: "27"
    marker_rules: ["30305", "31151"]  # Apache forbidden dir/file + 31151 correlation of the 410k-hit burst
    marker_event_ids: []
    content_signature:
      all:
        - "apache: attempt to access forbidden file or directory"
        - "client denied by server configuration"
        - "172.17.130.196"

  - name: webshell
    start: 2022-01-18T12:38:00Z
    end:   2022-01-18T12:38:30Z
    agent_id: "27"
    marker_rules: ["31108"]
    marker_event_ids: []
    content_signature:
      all:
        - "wp_meta"
        - "select * from wp_users"
        - "wordpress_db"

  # Same webshell URL as webshell/reverse_shell; the distinguishing content is the decoded
  # cracking command (`wphashcrack`, `rockyou`, `john`, `phopkins`).
  - name: cracking
    start: 2022-01-18T12:38:30Z
    end:   2022-01-18T13:13:50Z
    agent_id: "27"
    marker_rules: ["31108"]
    marker_event_ids: []
    content_signature:
      all:
        - "wp_meta"
        - "wphashcrack"
        - "rockyou.txt"
        - "phopkins"

  - name: reverse_shell
    start: 2022-01-18T13:13:50Z
    end:   2022-01-18T13:14:30Z
    agent_id: "27"
    marker_rules: ["31108"]
    marker_event_ids: []
    content_signature:
      all:
        - "wp_meta"
        - "/dev/tcp/192.168.130.77/51898"

  # rule 5304 "User successfully changed UID" (su www-data:phopkins) then rule 5402
  # "Successful sudo to ROOT executed" (`phopkins ... USER=root ; COMMAND=/bin/cat /etc/...`).
  - name: privilege_escalation
    start: 2022-01-18T13:14:30Z
    end:   2022-01-18T13:14:53Z
    agent_id: "27"
    marker_rules: ["5304", "5402"]
    marker_event_ids: []
    content_signature:
      all:
        - "www-data:phopkins"
        - "phopkins"
