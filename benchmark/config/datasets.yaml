# Source of the labelled attack dataset the benchmark evaluates against.
# AIT-ADS — AIT Alert Data Set (Landauer et al.), 8 victim-host scenarios.
ait-ads:
  source: zenodo
  record: "8263181"
  url: "https://zenodo.org/records/8263181"
  files: [ait_ads.zip]
  dest_subdir: "."
  extract: true
  strip_prefix: ait_ads
  scenarios: [fox, harrison, russellmitchell, santos, shaw, wardbeck, wilson, wheeler]
  labels: fixtures/labels.csv  # committed ground-truth phase windows
